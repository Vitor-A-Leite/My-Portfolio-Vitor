app = "meu-portfolio-projetos"
primary_region = "gru"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8000"
  DEBUG = "False"
  ALLOWED_HOSTS = "meu-portfolio-projetos.fly.dev"
  CSRF_TRUSTED_ORIGINS = "https://meu-portfolio-projetos.fly.dev"
  MEDIA_ROOT = "/data/media"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[mounts]]
  source = "portfolio_data"
  destination = "/data"

[deploy]
  release_command = "python manage.py migrate --noinput"
